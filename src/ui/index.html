<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>openbridge</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <script>
    window.addEventListener('error', function (e) {
      console.error('[renderer] error', e.message, e.filename, e.lineno, e.error);
    });
    window.addEventListener('unhandledrejection', function (e) {
      console.error('[renderer] unhandledrejection', e.reason);
    });
  </script>
  <div id="app">
    <header>
      <button type="button" id="btn-settings" title="Einstellungen">⚙️</button>
      <h1>🌉 openbridge</h1>
      <p>Gantt-Pläne in OpenProject importieren</p>
    </header>

    <div id="modal-settings" class="modal-root hidden" role="dialog" aria-modal="true" aria-labelledby="settings-title" aria-hidden="true">
      <div class="modal-backdrop" id="modal-settings-backdrop"></div>
      <div class="modal-dialog">
        <h2 id="settings-title">Einstellungen</h2>
        <label>OpenProject URL
          <input type="text" id="settings-url" placeholder="https://openproject.example.com" autocomplete="url">
        </label>
        <label>API-Key
          <input type="password" id="settings-apikey" autocomplete="off">
        </label>
        <div class="modal-actions">
          <button type="button" id="btn-settings-save">Speichern</button>
          <button type="button" id="btn-settings-close">Schließen</button>
        </div>
        <p id="settings-error" class="settings-error hidden" role="alert"></p>
      </div>
    </div>

    <main>
      <!-- Step 1: File Upload -->
      <section id="step-upload">
        <h2>1. Datei auswählen</h2>
        <div id="drop-zone">
          <p>Excel oder CSV hier reinziehen</p>
          <button id="btn-select-file">Datei auswählen</button>
        </div>
        <p id="selected-file"></p>
      </section>

      <!-- Step 2: Column Mapping -->
      <section id="step-mapping" class="hidden">
        <h2>2. Spalten zuordnen</h2>
        <div id="mapping-table"></div>
        <div id="project-select-row">
          <label>Projekt:</label>
          <select id="project-id"><option value="">— Projekt wählen —</option></select>
          <button type="button" id="btn-load-projects">Projekte abrufen</button>
          <span id="projects-status"></span>
        </div>
        <button id="btn-validate">Validieren & Vorschau</button>
        <div id="progress-block-validate" class="import-progress hidden" aria-live="polite">
          <div class="progress-track"><div class="progress-fill" data-progress-fill></div></div>
          <p class="progress-status" data-progress-status></p>
        </div>
      </section>

      <!-- Step 3: Preview / Dry-Run -->
      <section id="step-preview" class="hidden">
        <h2>3. Vorschau</h2>
        <div id="preview-summary"></div>
        <div id="preview-table"></div>
        <div id="validation-errors" class="hidden"></div>
        <button id="btn-import" class="primary" disabled>Jetzt importieren</button>
        <div id="progress-block-import" class="import-progress hidden" aria-live="polite">
          <div class="progress-track"><div class="progress-fill" data-progress-fill></div></div>
          <p class="progress-status" data-progress-status></p>
        </div>
        <p id="export-feedback" class="export-feedback hidden" role="status"></p>
        <button type="button" id="btn-export" class="secondary" disabled>Exportieren…</button>
      </section>

      <!-- Step 4: Import Log -->
      <section id="step-log" class="hidden">
        <h2>4. Import-Log</h2>
        <div id="import-log"></div>
        <button type="button" id="btn-export-log" class="secondary" disabled>Exportieren…</button>
        <button type="button" id="btn-new-import">Neuer Import</button>
      </section>
    </main>
  </div>
  <script src="app.js"></script>
</body>
</html>
