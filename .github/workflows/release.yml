# Windows NSIS-Build und optional GitHub Release.
#
# Trigger:
# - Push auf branch `main` → nur Build + Artifact-Upload
# - Git-Tag `v*` (z. B. v1.0.0) pushen → Build + Artifact + GitHub Release mit Installer
# - workflow_dispatch → nur Build + Artifact
#
# Release manuell auslösen:
#   git tag v1.0.0
#   git push origin v1.0.0

name: Windows build

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      # Kein Code-Signing-Zertifikat im Repo — verhindert hängende Signatur-Suche in CI.
      CSC_IDENTITY_AUTO_DISCOVERY: 'false'
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build NSIS installer
        run: npm run build

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: openbridge-windows-nsis
          path: |
            release/*.exe
            release/*.blockmap

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: openbridge ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: |
            release/openbridge Setup *.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
